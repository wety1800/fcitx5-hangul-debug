name: Build ARM64-v8a APK

on:
  push:
    branches:
      - master
      - feature/**
    paths-ignore:
      - '**.md'
      - '.github/workflows/fdroid.yml'
      - '.github/workflows/nix.yml'
      - '.github/workflows/publish.yml'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Init nested submodules
        run: |
          git submodule update --init --recursive
          git -C lib/libime/src/main/cpp/libime submodule update --init --recursive

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android environment
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          sdkmanager --install "cmake;3.31.6"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install extra-cmake-modules gettext

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build arm64-v8a Release APK
        run: |
          ./gradlew :app:assembleRelease -Pandroid.injected.build.abi=arm64-v8a

      - name: Get commit info
        id: commit_info
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: List build outputs
        run: |
          echo "=== Listing APK build outputs ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: Rename APK
        run: |
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            dir=$(dirname "$APK")
            newname="fcitx5-hangul-arm64-v8a-${{ steps.commit_info.outputs.timestamp }}-${{ steps.commit_info.outputs.short_sha }}.apk"
            mv "$APK" "$dir/$newname"
            echo "Renamed: $APK -> $dir/$newname"
          else
            echo "No APK found"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: fcitx5-hangul-arm64-v8a-${{ steps.commit_info.outputs.short_sha }}
          path: "**/*.apk"
          if-no-files-found: warn
          retention-days: 30
